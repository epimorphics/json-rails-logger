plugins: rubocop-rake

AllCops:
  NewCops: enable

Layout/LineLength:
  Max: 100
  AllowedPatterns: ['^(\s*#)']
  Exclude:
    - test/**/*

Metrics/BlockLength:
  Enabled: true
  Exclude:
    - test/**/*
    - json_rails_logger.gemspec

Style/Documentation:
  Exclude:
    - test/**/*

Style/OptionalBooleanParameter:
  Enabled: false
