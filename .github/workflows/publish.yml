name: Release and Publish Gem
on:
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  release_and_publish:
    name: Build, release, and publish gem
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Git information
      id: gitinfo
      run: |
        echo name=${GITHUB_REF#refs/*/}       | tee -a $GITHUB_OUTPUT
        echo branch=${GITHUB_REF#refs/heads/} | tee -a $GITHUB_OUTPUT
        make tags                             | tee -a $GITHUB_OUTPUT

    - name: Build gem
      run: make gem

    - name: Create release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.gitinfo.outputs.version }}
        name: v${{ steps.gitinfo.outputs.version }}
        generate_release_notes: true
        draft: false
        prerelease: false
        files: |
          json_rails_logger-${{ steps.gitinfo.outputs.version }}.gem

    - name: Publish gem
      env:
        PAT: ${{ secrets.GITHUB_TOKEN }}
      run: make publish
