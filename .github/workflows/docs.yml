# Generates and deploys YARD documentation to GitHub Pages
# Triggered on: manual dispatch or called by other workflows
name: docs

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string for documentation path (e.g., 2.3.0)'
        required: false
        type: string

  # Uncomment the following lines to enable manual triggering of the docs workflow
  # workflow_dispatch:
  #   inputs:
  #     version:
  #       description: 'Version string for documentation path (e.g., 2.3.0)'
  #       required: true
  #       type: string

permissions:
  id-token: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Generate YARD documentation
        run: make doc

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc/${{ inputs.version }}/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
